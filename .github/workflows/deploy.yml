name: Deploy to GitHub Pages (and purge mohsinhaemacademy.com cache)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # -------------------------------------------------------------------------
  # Edge-cache purge for mohsinhaemacademy.com/haemcalc/*
  # -------------------------------------------------------------------------
  # Topology: the main site proxies /haemcalc/* to muhdmohsin1979.github.io/HaemCalc/.
  # GitHub Pages is the source of truth; we just invalidate the Cloudflare
  # edge cache so the new build is visible immediately.
  #
  # Required repo secrets (Settings → Secrets and variables → Actions):
  #   CLOUDFLARE_API_TOKEN  — scoped to Zone.Cache Purge on the
  #                          mohsinhaemacademy.com zone only (least privilege).
  #   CLOUDFLARE_ZONE_ID    — the zone ID for mohsinhaemacademy.com.
  #
  # If either secret is missing this job is skipped cleanly — the GitHub Pages
  # deploy above still completes.
  # -------------------------------------------------------------------------
  purge-cloudflare:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ success() }}
    steps:
      - name: Check for Cloudflare secrets
        id: have_secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE:  ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ZONE" ]; then
            echo "present=true"  >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cloudflare cache purge skipped::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ZONE_ID not set. Add them to repo secrets to enable integrated deploy."
          fi

      - name: Purge /haemcalc/* on Cloudflare
        if: steps.have_secrets.outputs.present == 'true'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE:  ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          response=$(curl --fail --silent --show-error -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["mohsinhaemacademy.com/haemcalc"]}')
          echo "$response"
          echo "$response" | jq -e '.success == true' >/dev/null
